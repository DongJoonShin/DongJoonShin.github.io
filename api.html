<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>랜덤 유저 정보 가져오기</title>
    <link rel="stylesheet" href="style.css" />
    <script src="tracking.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #222;
        color: white;
        text-align: center;
        margin: 0;
        padding: 0;
      }

      .container {
        margin-top: 50px;
      }

      .user-card {
        background: #333;
        padding: 20px;
        border-radius: 10px;
        display: inline-block;
        text-align: center;
        margin-top: 20px;
      }

      .user-card img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
      }

      .fetch-button {
        padding: 10px 20px;
        font-size: 18px;
        border: none;
        background-color: #ff4757;
        color: white;
        cursor: pointer;
        border-radius: 5px;
        margin-top: 20px;
      }

      .fetch-button:hover {
        background-color: #e8413a;
      }
    </style>
  </head>
  <body>
    <nav>
      <ul
        style="
          display: flex;
          justify-content: center;
          gap: 20px;
          list-style: none;
          padding: 20px 0;
          background: #333;
        "
      >
        <li>
          <a href="index.html" style="color: white; text-decoration: none"
            >홈</a
          >
        </li>
        <li>
          <a href="runaway.html" style="color: white; text-decoration: none"
            >도망가기 효과</a
          >
        </li>
        <li>
          <a href="flip.html" style="color: white; text-decoration: none"
            >카드 뒤집기 효과</a
          >
        </li>
        <li>
          <a href="wave.html" style="color: white; text-decoration: none"
            >파도 효과</a
          >
        </li>
        <li>
          <a href="neon.html" style="color: white; text-decoration: none"
            >네온 효과</a
          >
        </li>
        <li>
          <a href="api.html" style="color: white; text-decoration: none"
            >API 테스트</a
          >
        </li>
        <li>
          <a href="error.html" style="color: white; text-decoration: none"
            >에러 테스트</a
          >
        </li>
        <li>
          <a href="event.html" style="color: white; text-decoration: none"
            >이벤트 테스트</a
          >
        </li>
      </ul>
    </nav>

    <div class="container">
      <h1>랜덤 유저 정보 가져오기</h1>
      <button class="fetch-button" onclick="fetchRandomUser()">
        유저 가져오기
      </button>
      <div class="user-card" id="userCard" style="display: none">
        <img id="userImage" src="" alt="User Image" />
        <h2 id="userName"></h2>
        <p id="userEmail"></p>
        <p id="userLocation"></p>
      </div>
    </div>

    <script>
      async function fetchRandomUser() {
        try {
          const response = await fetch('https://randomuser.me/api/');
          const data = await response.json();
          const user = data.results[0];

          document.getElementById('userImage').src = user.picture.large;
          document.getElementById(
            'userName'
          ).textContent = `${user.name.first} ${user.name.last}`;
          document.getElementById('userEmail').textContent = `📧 ${user.email}`;
          document.getElementById(
            'userLocation'
          ).textContent = `📍 ${user.location.city}, ${user.location.country}`;

          document.getElementById('userCard').style.display = 'block';
        } catch (error) {
          console.error('API 요청 중 오류 발생:', error);
          alert('유저 정보를 불러오는 데 실패했습니다.');
        }
      }
    </script>
  </body>
</html>
