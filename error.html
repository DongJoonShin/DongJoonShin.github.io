    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #222;
        color: white;
        text-align: center;
        margin: 0;
        padding: 0;
      }

      .container {
        margin-top: 50px;
      }

      .button-group {
        display: flex;
        flex-direction: column;
        gap: 20px;
        max-width: 400px;
        margin: 0 auto;
      }

      .test-button {
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        color: white;
        cursor: pointer;
        border-radius: 5px;
        transition: opacity 0.3s;
      }

      .test-button:hover {
        opacity: 0.8;
      }

      .success-button {
        background-color: #2ecc71;
      }

      .warning-button {
        background-color: #f1c40f;
      }

      .error-button {
        background-color: #e74c3c;
      }

      .result {
        margin-top: 30px;
        padding: 20px;
        border-radius: 5px;
        display: none;
      }

      .success {
        background-color: #27ae60;
      }

      .warning {
        background-color: #f39c12;
      }

      .error {
        background-color: #c0392b;
      }
    </style>
